- name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt || echo "Ignoring missing requirements"
          pip install usd-core --only-binary=:all: || echo "USD install failed, skipping"

      - name: Type-check with mypy
        working-directory: backend
        run: mypy app --ignore-missing-imports # Less aggressive than --strict

      - name: Run tests with coverage
        working-directory: backend
        env:
          APP_ENV: test
          # ... (rest of your env)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=1 # Allow pass with low coverage during Phase 0
            -v
