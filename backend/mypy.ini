# backend/mypy.ini
[mypy]
python_version = 3.12
ignore_missing_imports = true
disallow_untyped_defs = false   # relax until Phase 1 service implementations
warn_return_any = false
exclude = [
    "app/ai_physics/",          # Phase 2-3 stubs
    "app/sim_bridge/",          # Phase 2+ stubs
    "nvidia_cae/",              # Phase 2-3
]
