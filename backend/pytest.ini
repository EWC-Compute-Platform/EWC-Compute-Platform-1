[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings (mirrors CI gate)
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80
    -v
    --tb=short

# Markers
markers =
    unit: pure unit tests — no I/O
    integration: tests that touch DB or Redis mocks
    slow: tests that run longer than 1 second

#Additional setups
